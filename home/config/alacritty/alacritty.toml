# https://alacritty.org/config-alacritty.html

[general]
live_config_reload = true
working_directory = "~/Downloads"

[selection]
save_to_clipboard = true

[cursor]
blink_interval = 500

[cursor.style]
shape = "Underline"
blinking = "On"

[env]
TERM = "xterm-256color"
SHELL = "nu"

[terminal]
shell = "nu"
osc52 = "CopyPaste"

[font]
size = 14.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"
