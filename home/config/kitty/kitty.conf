###############################
# GENERAL SETTINGS
###############################

auto_reload_config 0.1
confirm_os_window_close 0
enable_audio_bell no
background #24273a
show_hyperlink_targets yes
enabled_layouts tall
allow_remote_control yes
copy_on_select yes
background_blur 1
hide_window_decorations yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

###############################
# FONT
###############################

# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# BEGIN_KITTY_FONTS
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

###############################
# KEYBINDIGS
###############################

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

map ctrl+c copy_and_clear_or_interrupt
map ctrl+v past_from_clipboard
map ctrl+shift+p command_palette

map --allow-fallback=shifted,ascii ctrl+w close_window
map --allow-fallback=shifted,ascii ctrl+alt+enter launch --cwd=current --type=tab

map ctrl+enter launch --cwd=current --copy-env --copy-colors

map ctrl+equal change_font_size all +2.0
map ctrl+plus change_font_size all +2.0
map ctrl+kp_add change_font_size all +2.0

map ctrl+minus change_font_size all -2.0
map ctrl+kp_subtract change_font_size all -2.0

map ctrl+0 change_font_size all 0
map ctrl+kp_insert change_font_size all 0

map ctrl+alt+right next_window
map ctrl+alt+down next_window
map ctrl+alt+left previous_window
map ctrl+alt+up previous_window
