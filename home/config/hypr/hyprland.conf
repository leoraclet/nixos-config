##############################
### WINDOWS AND WORKSPACES ###
##############################

# Screensharing
# https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#screensharing
# https://gist.github.com/brunoanc/2dea6ddf6974ba4e5d26c3139ffb7580
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more See
# https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Floating windows
windowrule = match:class qalculate-gtk, float on, size 800 800, pin on, stay_focused on
windowrule = match:class org.pulseaudio.pavucontrol, float on, size 800 800
windowrule = match:title flameshot, float on, stay_focused on
windowrule = match:title ^(Open File)$, float on, stay_focused on
windowrule = match:title ^(Save As)$, float on, stay_focused on
windowrule = match:class ^(nm-connection-editor)$, float on, stay_focused on
windowrule = match:class ^(.blueman-manager-wrapped)$, float on, stay_focused on

# You can look for the right class for you window with the following command
# hyprctl clients -j | grep class
windowrule = opaque on, match:class firefox
windowrule = opaque on, match:class obsidian, workspace 9
windowrule = opaque on, match:class thunderbird, workspace 8
windowrule = opaque on, match:class org.inkscape.Inkscape
windowrule = opaque on, match:class OrcaSlicer
windowrule = opaque on, match:class discord, workspace 6
windowrule = opaque on, match:class codium
windowrule = opaque on, match:class VSCodium
windowrule = opaque on, match:class libreoffice, workspace 10
windowrule = opaque on, match:class dev.zed.Zed, workspace 3
windowrule = opaque on, match:class brave-browser, workspace 2
windowrule = opaque on, match:class org.wireshark.Wireshark
windowrule = opaque on, match:class sublime_text, workspace 7
windowrule = opaque on, match:class vesktop
windowrule = opaque on, match:class .virt-manager-wrapped
windowrule = opaque on, match:class spicy
windowrule = opaque on, match:class org.kde.kdeconnect.app
windowrule = opaque on, match:class ONLYOFFICE
windowrule = opaque on, match:class Spotify, workspace 5
windowrule = opaque on, match:class nemo
windowrule = opaque on, match:class librewolf, workspace 4

windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
