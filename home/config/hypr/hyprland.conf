################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# hyprctl monitors all
monitor = eDP-1,1920x1080@60.02Hz,0x0,1
monitor = , preferred, auto, 1, mirror, eDP-1
monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1
monitor = HDMI-A-2, preferred, auto, 1, mirror, eDP-1

# Bind external monitor to workspace 20
workspace = 20, monitor:HDMI-A-1, default:true
workspace = 20, monitor:HDMI-A-2, default:true
workspace = 20, monitor:DP-2, default:true

workspace = 1, layout:scrolling, on-created-empty:kitty
workspace = 2, layout:scrolling, on-created-empty:brave
#workspace = 3, layout:scrolling, on-created-empty:zeditor
#workspace = 4, layout:scrolling, on-created-empty:librewolf
#workspace = 5, layout:scrolling, on-created-empty:spotify
#workspace = 6, layout:scrolling, on-created-empty:vesktop
#workspace = 7, layout:scrolling, on-created-empty:subl
#workspace = 8, layout:scrolling, on-created-empty:thunderbird
#workspace = 9, layout:scrolling, on-created-empty:obsidian

#################
### AUTOSTART ###
#################

# Noctalia shell
exec-once = noctalia-shell
exec-once = foot --server -c $XDG_CONFIG_HOME/foot/foot.ini
# SD Card reader fix (DELL Latitude 5520)
exec-once = modprobe rtsx_pci
# Apply cursor theme
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice

#####################
### LOOK AND FEEL ###
#####################

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    # The commented values are the defaults when using waybar default theme
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    resize_on_border = true
    allow_tearing = true

    col.active_border = rgba(eed49f88)
    col.inactive_border = rgb(b8c0e0)

    snap {
        enabled = true
    }

    layout = master
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 4

    active_opacity = 0.97
    inactive_opacity = 0.9
    fullscreen_opacity = 1

    shadow:enabled = false
    blur:enabled = true
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    workspace_wraparound = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1

    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 1, default, popin 80%
    animation = border, 1, 1, default
    animation = fade, 1, 1, default
    animation = workspaces, 0, 1, default
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    focus_on_activate = true
    background_color = 0x24273a
    disable_splash_rendering = true
    disable_scale_notification = true
}

cursor {
    hide_on_key_press = true
    no_break_fs_vrr = 1
}

binds {
    allow_workspace_cycles = true
}

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr, us
    kb_variant =
    kb_options = grp:alt_shift_toggle, fkeys:basic_13-24

    follow_mouse = 1
    focus_on_close = 2
    numlock_by_default = true

    sensitivity = 0

    touchpad {
        clickfinger_behavior = true
        natural_scroll = true
        disable_while_typing = false
    }
}

scrolling {
    direction = right
    fullscreen_on_one_column = true
    #column_width = 0.998
    column_width = 1
    direction = down
    follow_min_visible = 0.5
    focus_fit_method = 1
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}


gestures {
    workspace_swipe_distance = 200
    workspace_swipe_touch = true
    workspace_swipe_create_new = true
    workspace_swipe_min_speed_to_force = 10
    workspace_swipe_cancel_ratio = 0.3
    #workspace_swipe_forever = true
}

####################
### GESTURES     ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesturep = 2, pinch, mod: CTRL, cursorZoom, 1, live
gesturep = 3, horizontal, workspace
gesturep = 3, vertical, scrollMove
gesturep = 3, vertical, mod: CTRL, fullscreen
gesturep = 4, vertical, close
gesturep = 4, horizontal, special, 1

####################
### KEYBINDINGS  ###
####################

# Global shortcuts
bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$

# See the below links to bind ANY key :
# - https://github.com/xkbcommon/libxkbcommon/blob/master/include/xkbcommon/xkbcommon-keysyms.h
# - https://wiki.hypr.land/0.54.0/Configuring/Binds/#uncommon-syms--binding-with-a-keycode

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER
$ipc = noctalia-shell ipc call

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, kitty ~/Downloads
bind = $mainMod, Delete, forcekillactive,
bind = $mainMod, Backspace, killactive,
bind = $mainMod, Q, killactive
bind = $mainMod, W, togglefloating,
bind = $mainMod, E, exec, nemo
bind = $mainMod, P, layoutmsg, promote
bind = $mainMod, N, exec, pkill subl || subl
bind = $mainMod, B, exec, kitty btop
bind = $mainMod, C, exec, $ipc plugin:screen-toolkit colorPicker
bind = $mainMod, F, exec, pkill librewolf || librewolf
bind = $mainMod, X, exec, $ipc launcher emoji
bind = $mainMod, D, exec, $ipc darkMode toggle
bind = $mainMod, I, exec, $ipc nightLight toggle
bind = $mainMod, V, exec, $ipc launcher clipboard
bind = $mainMod, A, exec, $ipc launcher windows
bind = $mainMod, Z, exec, $ipc launcher windows
bind = $mainMod, K, exec, $ipc systemMonitor toggle
bind = $mainMod, R, exec, $ipc launcher toggle
bind = $mainMod, Escape, exec, $ipc sessionMenu toggle
bind = $mainMod, $mainMod_L, exec, $ipc launcher toggle
bind = $mainMod, SPACE, exec, $ipc plugin:screen-toolkit toggle
bind = $mainMod, comma, exec, $ipc settings toggle
bind = $mainMod, L, exec, $ipc lockScreen lock

bind = ALT, L, exec, $ipc lockScreen lock
bind = ALT, Return, fullscreen
bind = ALT, F4, forcekillactive

########################
# ZOOM
########################

bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

########################
# Screenshots
########################
bind = , Print, exec, flameshot gui && pkill flameshot
bind = $mainMod, Print, exec, flameshot gui && pkill flameshot
bind = $mainMod CTRL, Print, exec, flameshot screen

########################
# ALT+TAB behaviour
########################
bind = ALT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'down'
bind = ALT SHIFT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'up'

submap=alttab
bind = ALT, tab, sendshortcut, , tab, class:alttab
bind = ALT SHIFT, tab, sendshortcut, shift, tab, class:alttab

bindrt = ALT, ALT_L, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bindrt = ALT SHIFT, ALT_L, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bind = ALT, Return, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT SHIFT, Return, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT, escape, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
bind = ALT SHIFT, escape, exec, $XDG_CONFIG_HOME/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
submap = reset

windowrule = match:class alttab, size 1400 500
windowrule = match:class alttab, float on
windowrule = match:class alttab, no_anim on
windowrule = match:class alttab, stay_focused on
windowrule = match:class alttab, workspace special:alttab
windowrule = match:class alttab, border_size 1
windowrule = match:class alttab, rounding 5
windowrule = match:class alttab, no_blur on
windowrule = match:class alttab, force_rgbx on

#bind = ALT, Tab, cyclenext, bringactivetotop
#bind = ALT, Tab, layoutmsg, cyclenext
#bind = ALT, Tab, exec, hyprctl reload
bind = $mainMod, Tab, workspace, previous

########################
# Move window around with SUPER ALT + arrow key
########################
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d

########################
# Move focus with SUPER + arrow keys
########################
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

########################
# Media keys
########################
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindl = , XF86AudioMicMute, exec, $ipc volume muteInput
bindl = , XF86AudioPlay, exec, $ipc media playPause
bindl = , XF86AudioNext, exec, $ipc media next
bindl = , XF86AudioPrev, exec, $ipc media previous

bind = , XF86PowerOff, exec, $ipc sessionMenu toggle
bind = , XF86Sleep, exec, $ipc sessionMenu toggle
bind = , XF86Standby, exec, $ipc sessionMenu toggle
bind = , XF86Calculator, exec, pkill qalculate-gtk || qalculate-gtk
bind = , XF86Search, exec, $ipc launcher toggle

# Turn Off Laptop Display on Lid Close
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

########################
# Windows related
########################

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, Control_L, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, ALT_L, resizewindow

# Resize windows
binde = $mainMod SHIFT, right, resizeactive, 20 0
binde = $mainMod SHIFT, left, resizeactive, -20 0
binde = $mainMod SHIFT, up, resizeactive, 0 20
binde = $mainMod SHIFT, down, resizeactive, 0 -20

########################
# Workspaces related
########################

# Switch workspaces to a relative workspace
bindep = $mainMod CTRL, right, workspace, e+1
bindep = $mainMod CTRL, up, workspace, r+10
bindep = $mainMod CTRL, left, workspace, e-1
bindep = $mainMod CTRL, down, workspace, r-10

# Special workspace
bindp = $mainMod, M, togglespecialworkspace, btop
bindp = $mainMod SHIFT, M, movetoworkspace, special:btop

bindp = SUPER, S, togglespecialworkspace, tmp
bindp = $mainMod_SHIFT, S, movetoworkspace, special:tmp

# Switch workspaces with mainMod + [0-9]
bindp = $mainMod, KP_End, workspace, 1
bindp = $mainMod, KP_Down, workspace, 2
bindp = $mainMod, KP_Next, workspace, 3
bindp = $mainMod, KP_Left, workspace, 4
bindp = $mainMod, KP_Begin, workspace, 5
bindp = $mainMod, KP_Right, workspace, 6
bindp = $mainMod, KP_Home, workspace, 7
bindp = $mainMod, KP_Up, workspace, 8
bindp = $mainMod, KP_Prior, workspace, 9
bindp = $mainMod, KP_Insert, workspace, 10

bindp = $mainMod ALT, KP_End, workspace, 11
bindp = $mainMod ALT, KP_Down, workspace, 12
bindp = $mainMod ALT, KP_Next, workspace, 13
bindp = $mainMod ALT, KP_Left, workspace, 14
bindp = $mainMod ALT, KP_Begin, workspace, 15
bindp = $mainMod ALT, KP_Right, workspace, 16
bindp = $mainMod ALT, KP_Home, workspace, 17
bindp = $mainMod ALT, KP_Up, workspace, 18
bindp = $mainMod ALT, KP_Prior, workspace, 19
bindp = $mainMod ALT, KP_Insert, workspace, 20

bindp = $mainMod CTRL, KP_End, movetoworkspace, 11
bindp = $mainMod CTRL, KP_Down, movetoworkspace, 12
bindp = $mainMod CTRL, KP_Next, movetoworkspace, 13
bindp = $mainMod CTRL, KP_Left, movetoworkspace, 14
bindp = $mainMod CTRL, KP_Begin, movetoworkspace, 15
bindp = $mainMod CTRL, KP_Right, movetoworkspace, 16
bindp = $mainMod CTRL, KP_Home, movetoworkspace, 17
bindp = $mainMod CTRL, KP_Up, movetoworkspace, 18
bindp = $mainMod CTRL, KP_Prior, movetoworkspace, 19
bindp = $mainMod CTRL, KP_Insert, movetoworkspace, 20

