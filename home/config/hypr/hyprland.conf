source = ~/.config/hypr/macchiato.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# hyprctl monitors all
monitor = eDP-1,1920x1080@60.02Hz,0x0,1
monitor = , preferred, auto, 1, mirror, eDP-1
monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1
monitor = HDMI-A-2, preferred, auto, 1, mirror, eDP-1

# Bind external monitor to workspace 20
workspace = 20, monitor:HDMI-A-1, default:true
workspace = 20, monitor:HDMI-A-2, default:true
workspace = 20, monitor:DP-2, default:true

#################
### AUTOSTART ###
#################

# Noctalia shell
exec-once = noctalia-shell
# SD Card reader fix (DELL Latitude 5520)
exec-once = modprobe rtsx_pci

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#####################
### LOOK AND FEEL ###
#####################

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    # The commented values are the defaults when using waybar default theme
    gaps_in = 1
    gaps_out = 3
    border_size = 1
    col.active_border = $yellow
    col.inactive_border = $surface1
    resize_on_border = true

    snap {
        enabled = true
    }

    layout = scrolling
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 4

    active_opacity = 0.95
    inactive_opacity = 0.9
    fullscreen_opacity = 1

    shadow:enabled = false
    blur:enabled = false

}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 2, default
    animation = fade, 1, 4, default
    animation = workspaces, 0, 1, default
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = 0x24273a
    disable_splash_rendering = true
    disable_scale_notification = true
}

cursor {
    hide_on_key_press = true
    no_break_fs_vrr = 1
}

binds {
    allow_workspace_cycles = true
}

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr, us
    kb_variant =
    kb_options = grp:alt_shift_toggle, fkeys:basic_13-24

    follow_mouse = 1
    focus_on_close = 2
    numlock_by_default = true

    sensitivity = 0

    touchpad {
        clickfinger_behavior = true
        natural_scroll = true
        disable_while_typing = false
    }
}

scrolling {
    direction = right
    fullscreen_on_one_column = true
    #column_width = 0.998
    column_width = 1
    direction = down
    follow_min_visible = 0
    focus_fit_method = 1
}

gestures {
    workspace_swipe_distance = 200
    workspace_swipe_touch = true
    #workspace_swipe_forever = true
}

####################
### GESTURES     ###
####################

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gesturep = 3, horizontal, workspace
gesturep = 4, vertical, close
gesturep = 4, horizontal, special, 1
gesturep = 2, pinch, mod: CTRL, cursorZoom, 1, live
gesturep = 3, vertical, scrollMove

####################
### KEYBINDINGS  ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER
$ipc = noctalia-shell ipc call

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, kitty ~/Downloads
bind = $mainMod, Backspace, killactive,
bind = $mainMod, Q, exec, pkill qalculate-gtk || qalculate-gtk
bind = $mainMod, W, togglefloating,
bind = $mainMod, E, exec, nemo
bind = $mainMod, P, layoutmsg, promote
bind = $mainMod, N, exec, pkill subl || subl
bind = $mainMod, B, exec, kitty btop
bind = $mainMod, C, exec, $ipc plugin:screen-toolkit colorPicker
bind = $mainMod, F, exec, pkill librewolf || librewolf
bind = $mainMod, X, exec, $ipc launcher emoji
bind = $mainMod, D, exec, $ipc darkMode toggle
bind = $mainMod, I, exec, $ipc nightLight toggle
bind = $mainMod, V, exec, $ipc launcher clipboard
bind = $mainMod, A, exec, $ipc launcher windows
bind = $mainMod, Z, exec, $ipc launcher windows
bind = $mainMod, K, exec, $ipc systemMonitor toggle
bind = $mainMod, R, exec, $ipc launcher toggle
bind = $mainMod, Escape, exec, $ipc sessionMenu toggle
bind = $mainMod, $mainMod_L, exec, $ipc launcher toggle
bind = $mainMod, SPACE, exec, $ipc plugin:screen-toolkit toggle
bind = $mainMod, S, exec, $ipc controlCenter toggle
bind = $mainMod, comma, exec, $ipc settings toggle
bind = $mainMod, L, exec, $ipc lockScreen lock

bind = ALT, L, exec, $ipc lockScreen lock
bind = ALT, Return, fullscreen
bind = ALT, F4, killactive

########################
# ZOOM
########################

bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

########################
# Screenshots
########################
bind = , Print, exec, flameshot gui && pkill flameshot
bind = $mainMod, Print, exec, flameshot gui && pkill flameshot

########################
# ALT+TAB behaviour
########################
bind = ALT, Tab, cyclenext, bringactivetotop
bind = $mainMod, Tab, workspace, previous

########################
# Move window around with SUPER ALT + arrow key
########################
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d

########################
# Move focus with mainMod + arrow keys
########################
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

########################
# Media keys
########################
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindl = , XF86AudioMicMute, exec, $ipc volume muteInput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease
bind = , XF86poweroff, exec, $ipc sessionMenu toggle

# Turn Off Laptop Display on Lid Close
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

########################
# Windows related
########################

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize windows
binde = $mainMod SHIFT, right, resizeactive, 20 0
binde = $mainMod SHIFT, left, resizeactive, -20 0
binde = $mainMod SHIFT, up, resizeactive, 0 20
binde = $mainMod SHIFT, down, resizeactive, 0 -20

########################
# Workspaces related
########################

# Switch workspaces to a relative workspace
bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, up, workspace, r+10
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod CTRL, down, workspace, r-10

# Special workspace
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, KP_End, workspace, 1
bind = $mainMod, KP_Down, workspace, 2
bind = $mainMod, KP_Next, workspace, 3
bind = $mainMod, KP_Left, workspace, 4
bind = $mainMod, KP_Begin, workspace, 5
bind = $mainMod, KP_Right, workspace, 6
bind = $mainMod, KP_Home, workspace, 7
bind = $mainMod, KP_Up, workspace, 8
bind = $mainMod, KP_Prior, workspace, 9
bind = $mainMod, KP_Insert, workspace, 10

bind = $mainMod ALT, KP_End, workspace, 11
bind = $mainMod ALT, KP_Down, workspace, 12
bind = $mainMod ALT, KP_Next, workspace, 13
bind = $mainMod ALT, KP_Left, workspace, 14
bind = $mainMod ALT, KP_Begin, workspace, 15
bind = $mainMod ALT, KP_Right, workspace, 16
bind = $mainMod ALT, KP_Home, workspace, 17
bind = $mainMod ALT, KP_Up, workspace, 18
bind = $mainMod ALT, KP_Prior, workspace, 19
bind = $mainMod ALT, KP_Insert, workspace, 20

bind = $mainMod CTRL, KP_End, movetoworkspace, 11
bind = $mainMod CTRL, KP_Down, movetoworkspace, 12
bind = $mainMod CTRL, KP_Next, movetoworkspace, 13
bind = $mainMod CTRL, KP_Left, movetoworkspace, 14
bind = $mainMod CTRL, KP_Begin, movetoworkspace, 15
bind = $mainMod CTRL, KP_Right, movetoworkspace, 16
bind = $mainMod CTRL, KP_Home, movetoworkspace, 17
bind = $mainMod CTRL, KP_Up, movetoworkspace, 18
bind = $mainMod CTRL, KP_Prior, movetoworkspace, 19
bind = $mainMod CTRL, KP_Insert, movetoworkspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, KP_End, movetoworkspace, 1
bind = $mainMod SHIFT, KP_Down, movetoworkspace, 2
bind = $mainMod SHIFT, KP_Next, movetoworkspace, 3
bind = $mainMod SHIFT, KP_Left, movetoworkspace, 4
bind = $mainMod SHIFT, KP_Begin, movetoworkspace, 5
bind = $mainMod SHIFT, KP_Right, movetoworkspace, 6
bind = $mainMod SHIFT, KP_Home, movetoworkspace, 7
bind = $mainMod SHIFT, KP_Up, movetoworkspace, 8
bind = $mainMod SHIFT, KP_Prior, movetoworkspace, 9
bind = $mainMod SHIFT, KP_Insert, movetoworkspace, 10

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod ALT, 1, workspace, 11
bind = $mainMod ALT, 2, workspace, 12
bind = $mainMod ALT, 3, workspace, 13
bind = $mainMod ALT, 4, workspace, 14
bind = $mainMod ALT, 5, workspace, 15
bind = $mainMod ALT, 6, workspace, 16
bind = $mainMod ALT, 7, workspace, 17
bind = $mainMod ALT, 8, workspace, 18
bind = $mainMod ALT, 9, workspace, 19
bind = $mainMod ALT, 0, workspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, movetoworkspace, 11
bind = $mainMod CTRL, 2, movetoworkspace, 12
bind = $mainMod CTRL, 3, movetoworkspace, 13
bind = $mainMod CTRL, 4, movetoworkspace, 14
bind = $mainMod CTRL, 5, movetoworkspace, 15
bind = $mainMod CTRL, 6, movetoworkspace, 16
bind = $mainMod CTRL, 7, movetoworkspace, 17
bind = $mainMod CTRL, 8, movetoworkspace, 18
bind = $mainMod CTRL, 9, movetoworkspace, 19
bind = $mainMod CTRL, 0, movetoworkspace, 20

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Screensharing
# https://wiki.hypr.land/Useful-Utilities/Screen-Sharing/#screensharing
# https://gist.github.com/brunoanc/2dea6ddf6974ba4e5d26c3139ffb7580
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}


# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more See
# https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Floating windows
windowrule = match:class qalculate-gtk, float on
windowrule = size 800 800, match:class qalculate-gtk

windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = size 800 800, match:class org.pulseaudio.pavucontrol

windowrule = match:class flameshot, float on

# You can look for the right class for you window with the following command
# hyprctl clients -j | grep class
windowrule = opaque on, match:class firefox
windowrule = opaque on, match:class obsidian
windowrule = opaque on, match:class thunderbird
windowrule = opaque on, match:class org.inkscape.Inkscape
windowrule = opaque on, match:class OrcaSlicer
windowrule = opaque on, match:class discord
windowrule = opaque on, match:class codium
windowrule = opaque on, match:class VSCodium
windowrule = opaque on, match:class libreoffice
windowrule = opaque on, match:class dev.zed.Zed
windowrule = opaque on, match:class brave-browser
windowrule = opaque on, match:class org.wireshark.Wireshark
windowrule = opaque on, match:class sublime_text
windowrule = opaque on, match:class vesktop
windowrule = opaque on, match:class .virt-manager-wrapped
windowrule = opaque on, match:class spicy
windowrule = opaque on, match:class org.kde.kdeconnect.app
windowrule = opaque on, match:class ONLYOFFICE
windowrule = opaque on, match:class Spotify
windowrule = opaque on, match:class nemo

windowrule = opaque on, match:class librewolf
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
windowrule = opaque on, match:class EXAMPLE
